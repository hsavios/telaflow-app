name: Deploy TelaFlow

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hsavios
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build e push da API
        run: |
          docker build \
            -f apps/cloud-api/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/telaflow-cloud-api:${{ github.sha }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/telaflow-cloud-api:${{ github.sha }}

      - name: Build e push do Web
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_CLOUD_API_URL=https://api.telaflow.ia.br \
            -f apps/cloud-web/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/telaflow-cloud-web:${{ github.sha }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/telaflow-cloud-web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read

    steps:
      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          # Opcional: uma linha no formato `ssh-keyscan -H seu.servidor` (recomendado se a VPS bloqueia keyscan a partir do GitHub).
          SSH_KNOWN_HOSTS_LINE: ${{ secrets.SSH_KNOWN_HOSTS_LINE }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then echo "::error::Segredo SSH_HOST vazio ou ausente no ambiente production."; exit 1; fi
          if [ -z "${SSH_USER:-}" ]; then echo "::error::Segredo SSH_USER vazio ou ausente no ambiente production."; exit 1; fi
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then echo "::error::Segredo SSH_PRIVATE_KEY vazio ou ausente no ambiente production."; exit 1; fi

          SSH_DIR="${HOME}/.ssh"
          if [ -e "$SSH_DIR" ] && [ ! -d "$SSH_DIR" ]; then
            echo "::notice::Removendo $SSH_DIR (existia como arquivo, não pasta)."
            rm -f "$SSH_DIR"
          fi
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          umask 077
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          : > "$SSH_DIR/known_hosts"
          chmod 644 "$SSH_DIR/known_hosts"
          if [ -n "${SSH_KNOWN_HOSTS_LINE:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS_LINE" >> "$SSH_DIR/known_hosts"
            echo "::notice::known_hosts preenchido pelo segredo SSH_KNOWN_HOSTS_LINE."
          else
            KEYSCAN_ERR="$(mktemp)"
            if ssh-keyscan -T 25 -H "$SSH_HOST" >> "$SSH_DIR/known_hosts" 2>"$KEYSCAN_ERR"; then
              echo "::notice::ssh-keyscan concluído para ${SSH_HOST}."
            else
              echo "::warning::ssh-keyscan não alcançou ${SSH_HOST} a partir do runner (firewall, DNS ou bloqueio comum). O deploy usará StrictHostKeyChecking=accept-new. Para evitar isso, crie o segredo SSH_KNOWN_HOSTS_LINE no ambiente production (saída de: ssh-keyscan -H SEU_HOST)."
              cat "$KEYSCAN_ERR" >&2 || true
              : > "$SSH_DIR/known_hosts"
            fi
            rm -f "$KEYSCAN_ERR"
          fi

      - name: Deploy na VPS
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile="${HOME}/.ssh/known_hosts" \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            export GHCR_USERNAME='hsavios' && \
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' && \
            cd /opt/telaflow && \
            echo \"\$GHCR_TOKEN\" | docker login ghcr.io -u \"\$GHCR_USERNAME\" --password-stdin && \
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/' .env && \
            docker compose pull && \
            docker compose up -d
          "
