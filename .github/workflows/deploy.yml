name: Deploy TelaFlow

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hsavios
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build e push da API
        run: |
          docker build \
            -f apps/cloud-api/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/telaflow-cloud-api:${{ github.sha }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/telaflow-cloud-api:${{ github.sha }}

      - name: Build e push do Web
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_CLOUD_API_URL=https://api.telaflow.ia.br \
            -f apps/cloud-web/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/telaflow-cloud-web:${{ github.sha }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/telaflow-cloud-web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read

    steps:
      - name: Configurar chave SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then echo "::error::Segredo SSH_HOST vazio ou ausente no ambiente production."; exit 1; fi
          if [ -z "${SSH_USER:-}" ]; then echo "::error::Segredo SSH_USER vazio ou ausente no ambiente production."; exit 1; fi
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then echo "::error::Segredo SSH_PRIVATE_KEY vazio ou ausente no ambiente production."; exit 1; fi

          SSH_DIR="${HOME}/.ssh"
          if [ -e "$SSH_DIR" ] && [ ! -d "$SSH_DIR" ]; then
            echo "::notice::Removendo $SSH_DIR (existia como ficheiro, não pasta)."
            rm -f "$SSH_DIR"
          fi
          mkdir -p "$SSH_DIR"
          umask 077
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          KEYSCAN_ERR="$(mktemp)"
          if ! ssh-keyscan -T 20 -H "$SSH_HOST" >> "$SSH_DIR/known_hosts" 2>"$KEYSCAN_ERR"; then
            echo "::error::ssh-keyscan falhou para o anfitrião configurado em SSH_HOST (DNS, rede ou serviço SSH indisponível a partir do runner)."
            cat "$KEYSCAN_ERR" >&2 || true
            exit 1
          fi
          if [ ! -s "$SSH_DIR/known_hosts" ]; then
            echo "::error::known_hosts ficou vazio após ssh-keyscan."
            exit 1
          fi
          rm -f "$KEYSCAN_ERR"

      - name: Deploy na VPS
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            export GHCR_USERNAME='hsavios' && \
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' && \
            cd /opt/telaflow && \
            echo \"\$GHCR_TOKEN\" | docker login ghcr.io -u \"\$GHCR_USERNAME\" --password-stdin && \
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/' .env && \
            docker compose pull && \
            docker compose up -d
          "
